<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<meta name="description" content="私人、簡單、離線 QR Code 產生器">
<title>Michael QR — 私人 QR Code 產生器</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;color:#111827;background:#f3f4f6}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}.app{width:min(720px,100%);background:#fff;border-radius:28px;padding:clamp(22px,5vw,44px);box-shadow:0 24px 70px rgba(17,24,39,.12)}.brand{display:flex;align-items:center;gap:14px;margin-bottom:26px}.logo{width:52px;height:52px;border-radius:16px;background:#111827;color:#fff;display:grid;place-items:center;font-size:26px}.brand h1{font-size:clamp(25px,5vw,38px);margin:0}.brand p{margin:3px 0 0;color:#6b7280}label{display:block;font-weight:700;margin-bottom:9px}.input{width:100%;min-height:118px;resize:vertical;border:1px solid #d1d5db;border-radius:16px;padding:15px;font:inherit;font-size:16px;outline:none}.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.option label{font-size:13px;color:#4b5563}.option select{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:11px;background:#fff;font:inherit}.actions{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}.btn{border:0;border-radius:13px;padding:12px 17px;font:inherit;font-weight:700;cursor:pointer}.primary{background:#111827;color:#fff}.secondary{background:#e5e7eb}.install{background:#dbeafe;color:#1e3a8a}.btn:disabled{opacity:.4;cursor:not-allowed}.preview{min-height:340px;border:1px dashed #d1d5db;border-radius:20px;display:grid;place-items:center;padding:22px;background:#fafafa}.preview canvas,.preview img{max-width:100%;height:auto}.placeholder{text-align:center;color:#6b7280}.placeholder .big{font-size:54px;display:block;margin-bottom:8px}.status{margin-top:14px;font-size:14px;color:#047857}.status.error{color:#b91c1c}.privacy{margin-top:24px;padding:15px 17px;background:#ecfdf5;border-radius:14px;color:#065f46;font-size:14px;line-height:1.55}.foot{margin-top:18px;text-align:center;color:#9ca3af;font-size:12px}@media(max-width:520px){body{padding:12px}.app{border-radius:20px}.options{grid-template-columns:1fr}.preview{min-height:300px}.btn{flex:1}}
</style>
</head>
<body>
<main class="app">
<header class="brand"><div class="logo">▦</div><div><h1>Michael QR</h1><p>私人、簡單、離線 QR Code 產生器</p></div></header>
<label for="urlInput">貼上網址或文字</label>
<textarea id="urlInput" class="input" spellcheck="false" placeholder="例如：https://classroom.google.com/…"></textarea>
<div class="options"><div class="option"><label for="sizeSelect">圖片大小</label><select id="sizeSelect"><option value="320">320 × 320</option><option value="512" selected>512 × 512</option><option value="768">768 × 768</option><option value="1024">1024 × 1024</option></select></div><div class="option"><label for="errorSelect">容錯程度</label><select id="errorSelect"><option value="M">標準</option><option value="Q" selected>較高</option><option value="H">最高</option></select></div></div>
<div class="actions"><button id="generateBtn" class="btn primary">產生 QR Code</button><button id="downloadBtn" class="btn secondary" disabled>下載 PNG</button><button id="copyBtn" class="btn secondary" disabled>複製圖片</button><button id="clearBtn" class="btn secondary">清除</button><button id="installBtn" class="btn install">安裝 App</button></div>
<section id="preview" class="preview"><div id="placeholder" class="placeholder"><span class="big">⌗</span>貼上內容後按「產生 QR Code」</div><div id="qrcode" hidden></div></section>
<div id="status" class="status">未有任何資料被上載。</div>
<aside class="privacy"><strong>私隱設計：</strong>QR code 直接喺瀏覽器內生成；程式冇伺服器、冇 analytics、冇廣告，亦唔會自動儲存你輸入嘅網址。</aside>
<div class="foot">Samsung Chrome：按「安裝 App」；如未出現安裝提示，按右上角 ⋮ → 加入主畫面。</div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const input=document.getElementById('urlInput'),box=document.getElementById('qrcode'),placeholder=document.getElementById('placeholder'),statusEl=document.getElementById('status'),downloadBtn=document.getElementById('downloadBtn'),copyBtn=document.getElementById('copyBtn'),installBtn=document.getElementById('installBtn');
const setStatus=(t,e=false)=>{statusEl.textContent=t;statusEl.className=e?'status error':'status'};
const normalise=v=>{const t=v.trim();return !t?'':/^[a-zA-Z][a-zA-Z\d+.-]*:/.test(t)?t:`https://${t}`};
function getCanvas(){return box.querySelector('canvas')}
function generate(){const text=normalise(input.value);if(!text){setStatus('請先貼上網址或文字。',true);return}if(typeof QRCode==='undefined'){setStatus('QR 程式未能載入，請連接網絡後重新整理一次。',true);return}try{box.innerHTML='';const size=Number(document.getElementById('sizeSelect').value);const level={M:QRCode.CorrectLevel.M,Q:QRCode.CorrectLevel.Q,H:QRCode.CorrectLevel.H}[document.getElementById('errorSelect').value];new QRCode(box,{text,width:size,height:size,colorDark:'#111827',colorLight:'#ffffff',correctLevel:level});box.hidden=false;placeholder.hidden=true;downloadBtn.disabled=false;copyBtn.disabled=false;setStatus('QR code 已在你部裝置本地生成。')}catch(err){console.error(err);setStatus('產生失敗：'+(err&&err.message?err.message:'未知錯誤'),true)}}
document.getElementById('generateBtn').onclick=generate;document.getElementById('clearBtn').onclick=()=>{input.value='';box.innerHTML='';box.hidden=true;placeholder.hidden=false;downloadBtn.disabled=true;copyBtn.disabled=true;setStatus('未有任何資料被上載。')};
downloadBtn.onclick=()=>{const c=getCanvas();if(!c)return;const a=document.createElement('a');a.download='QR-Code-'+new Date().toISOString().slice(0,10)+'.png';a.href=c.toDataURL('image/png');a.click()};
copyBtn.onclick=async()=>{try{const c=getCanvas();const blob=await new Promise(r=>c.toBlob(r,'image/png'));await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);setStatus('QR code 圖片已複製。')}catch{setStatus('此瀏覽器未支援直接複製圖片，請使用下載 PNG。',true)}};
let installPrompt=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e;setStatus('Michael QR 已準備好安裝。')});installBtn.onclick=async()=>{if(installPrompt){installPrompt.prompt();const choice=await installPrompt.userChoice;installPrompt=null;setStatus(choice.outcome==='accepted'?'正在安裝 Michael QR…':'已取消安裝。',choice.outcome!=='accepted');return}setStatus('請按 Chrome 右上角 ⋮，再揀「安裝應用程式」或「加入主畫面」。',true)};window.addEventListener('appinstalled',()=>setStatus('Michael QR 已成功安裝。'));
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
</script>
</body></html>
